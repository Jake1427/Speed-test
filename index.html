<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Lab - Fixed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-black transition-colors duration-300" id="body">
    <div class="min-h-screen flex items-center justify-center p-4">
        
        <div id="main-card" class="w-full max-w-4xl rounded-2xl shadow-xl bg-white transition-colors duration-300 flex flex-col max-h-[95vh]">
            
            <div class="p-6 sm:p-10 space-y-8 overflow-y-auto scrollbar-hide flex-1">
                
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-2xl font-semibold">Speed Lab</h1>
                    <button class="btn btn-outline" id="btn-theme">Dark Mode</button>
                </div>

                <div class="flex gap-3 justify-center flex-wrap mb-6" id="mode-selector"></div>

                <div class="flex gap-2 justify-center flex-wrap mb-4" id="time-selector"></div>

                <div class="text-center text-sm opacity-70 mt-2 mb-6" id="personal-best"></div>

                <div id="active-mode-container" class="min-h-[220px] flex flex-col justify-center"></div>

                <div id="chart-wrapper" class="pt-6 mt-8 border-t border-gray-200 hidden">
                    <canvas id="history-chart" width="100%" height="35"></canvas>
                </div>

            </div>
        </div>
    </div>

    <div id="popup" class="fixed bottom-6 right-6 bg-black text-white px-6 py-4 rounded-2xl shadow-2xl z-50 hidden transition-opacity duration-300 opacity-0">
        <div class="text-lg font-semibold" id="popup-title"></div>
        <div class="text-sm opacity-70" id="popup-subtitle"></div>
        <div class="text-sm mt-1" id="popup-rating"></div>
        <div class="text-right mt-2">
            <button class="btn btn-outline btn-sm popup-close" id="btn-close-popup">Close</button>
        </div>
    </div>

<script>
/* =========================
   CONFIG / UTILITIES
========================= */
const WORD_BANK = [
  "focus", "speed", "clean", "minimal", "keyboard", "reaction", "accuracy", "precision", "smooth", "timing",
  "design", "motion", "simple", "modern", "rapid", "flow", "track", "sharp", "logic", "swift",
  "stable", "robust", "future", "optimize", "latency", "memory", "signal", "frame", "render", "input"
];
const TIME_OPTIONS = [1, 5, 10, 30];

function generateWords(count = 40) {
  return Array.from({ length: count }, () => WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)]);
}

function ratingWPM(wpm) {
  if (wpm < 30) return "Beginner";
  if (wpm < 50) return "Solid";
  if (wpm < 70) return "Fast";
  if (wpm < 90) return "Cracked";
  return "Elite";
}

function ratingCPS(cps) {
  if (cps < 4) return "Casual";
  if (cps < 6) return "Quick";
  if (cps < 8) return "Fast";
  if (cps < 10) return "Speed Demon";
  return "Inhuman";
}

/* =========================
   STATE MANAGEMENT
========================= */
const state = {
    mode: "typing",
    timeLimit: 10,
    timeLeft: 10,
    isActive: false,
    darkMode: false,
    words: generateWords(),
    input: "",
    startedTyping: false,
    clicks: 0,
    reactionState: "idle",
    reactionStart: null,
    reactionTime: null,
    history: [],
    popup: null
};

let intervalRef = null;
let timeoutRef = null;
let chartInstance = null;

/* =========================
   CORE LOGIC & TIMERS
========================= */
function clearTimers() {
    clearInterval(intervalRef);
    clearTimeout(timeoutRef);
}

function setTimeLimit(t) {
    state.timeLimit = t;
    state.timeLeft = t;
    renderAll();
}

function setMode(m) {
    clearTimers();
    state.mode = m;
    state.isActive = false;
    renderAll();
}

function toggleDarkMode() {
    state.darkMode = !state.darkMode;
    const body = document.getElementById('body');
    const card = document.getElementById('main-card');
    const themeBtn = document.getElementById('btn-theme');
    const chartWrap = document.getElementById('chart-wrapper');
    
    if(state.darkMode) {
        body.className = "bg-gray-900 text-white transition-colors duration-300";
        card.className = "w-full max-w-4xl rounded-2xl shadow-xl bg-gray-800 transition-colors duration-300 flex flex-col max-h-[95vh]";
        chartWrap.classList.replace("border-gray-200", "border-gray-700");
        themeBtn.innerText = "Light Mode";
    } else {
        body.className = "bg-gray-50 text-black transition-colors duration-300";
        card.className = "w-full max-w-4xl rounded-2xl shadow-xl bg-white transition-colors duration-300 flex flex-col max-h-[95vh]";
        chartWrap.classList.replace("border-gray-700", "border-gray-200");
        themeBtn.innerText = "Dark Mode";
    }
    updateChart(); // Refresh chart colors
}

/* =========================
   TYPING MODE
========================= */
function startTyping() {
    clearTimers();
    state.words = generateWords();
    state.input = "";
    state.startedTyping = false;
    state.timeLeft = state.timeLimit;
    state.isActive = true;
    
    renderMainContainer(); // Build UI
    
    setTimeout(() => {
        const inputEl = document.getElementById('typing-input');
        if(inputEl) inputEl.focus();
    }, 50);
}

function handleTypingInput(e) {
    if (!state.startedTyping) {
        state.startedTyping = true;
        intervalRef = setInterval(() => {
            state.timeLeft--;
            document.getElementById('timer-display').innerText = `Time: ${state.timeLeft}s`;
            if (state.timeLeft <= 0) {
                finishTyping();
            }
        }, 1000);
    }
    state.input = e.target.value;
    updateTypingWordsUI(); // Granular update, won't steal focus
}

function updateTypingWordsUI() {
    const display = document.getElementById('words-display');
    if (!display) return;
    const typedWords = state.input.split(" ");
    
    display.innerHTML = state.words.map((word, i) => {
        const typed = typedWords[i];
        let colorClass = "";
        if (typed != null) {
            colorClass = typed === word ? "text-green-500" : "text-red-500";
        }
        return `<span class="${colorClass} mr-2">${word}</span>`;
    }).join('');
}

function finishTyping() {
    clearTimers();
    state.isActive = false;

    const typedWords = state.input.trim().split(/\s+/);
    let totalChars = 0;
    let correctChars = 0;

    state.words.forEach((word, i) => {
        totalChars += word.length;
        if (!typedWords[i]) return;
        for (let j = 0; j < word.length; j++) {
            if (typedWords[i][j] === word[j]) correctChars++;
        }
    });

    const minutes = state.timeLimit / 60;
    const wpm = Math.max(0, Math.round((correctChars / 5) / minutes));
    const accuracy = totalChars === 0 ? 0 : Math.round((correctChars / totalChars) * 100);

    saveResult({ mode: "typing", score: wpm, accuracy });
    showPopup(`${wpm} WPM`, `${accuracy}% Accuracy`, ratingWPM(wpm));
    renderAll();
}

/* =========================
   CLICKING MODE
========================= */
function startClicking() {
    clearTimers();
    state.clicks = 0;
    state.timeLeft = state.timeLimit;
    state.isActive = true;
    
    renderMainContainer();

    intervalRef = setInterval(() => {
        state.timeLeft--;
        document.getElementById('timer-display').innerText = `Time: ${state.timeLeft}s`;
        if (state.timeLeft <= 0) {
            finishClicking();
        }
    }, 1000);
}

function handleClickArea() {
    if (state.isActive) {
        state.clicks++;
        const target = document.getElementById('click-target');
        if(target) target.innerText = `${state.clicks} clicks`;
    }
}

function finishClicking() {
    clearTimers();
    state.isActive = false;
    const cps = Number((state.clicks / state.timeLimit).toFixed(2));
    
    saveResult({ mode: "clicking", score: cps });
    showPopup(`${cps} CPS`, `${state.clicks} clicks in ${state.timeLimit}s`, ratingCPS(cps));
    renderAll();
}

/* =========================
   REACTION MODE
========================= */
function startReaction() {
    clearTimers();
    state.reactionTime = null;
    state.reactionState = "red";
    renderMainContainer();

    const yellowDelay = 400 + Math.random() * 1200;
    const greenDelay = yellowDelay + 600 + Math.random() * 2000;

    timeoutRef = setTimeout(() => {
        state.reactionState = "yellow";
        updateReactionUI();
    }, yellowDelay);

    setTimeout(() => {
        state.reactionState = "green";
        state.reactionStart = performance.now();
        updateReactionUI();
    }, greenDelay);
}

function handleReactionClick() {
    if (state.reactionState === "green") {
        const delay = Math.round(performance.now() - state.reactionStart);
        state.reactionTime = delay;
        state.reactionState = "idle";
        
        saveResult({ mode: "reaction", score: delay });
        showPopup(`${delay} ms`, `Reaction time`, delay < 200 ? "Insane" : delay < 250 ? "Fast" : "Human");
        renderAll();
    } else if (state.reactionState !== "idle") {
        state.reactionTime = "Too Early";
        state.reactionState = "idle";
        renderMainContainer();
    }
}

function updateReactionUI() {
    const target = document.getElementById('reaction-target');
    if(!target) return;
    
    target.className = "w-40 h-40 mx-auto rounded-2xl flex items-center justify-center text-xl font-semibold cursor-pointer select-none shadow-md transition-colors duration-100 ";
    
    if(state.reactionState === "red") {
        target.className += "bg-red-500 text-white";
        target.innerText = "RED";
    } else if(state.reactionState === "yellow") {
        target.className += "bg-yellow-400 text-black";
        target.innerText = "YELLOW";
    } else if(state.reactionState === "green") {
        target.className += "bg-green-500 text-white";
        target.innerText = "GREEN";
    } else {
        target.className += "bg-gray-400 text-white";
        target.innerText = "WAIT";
    }
}

/* =========================
   UI UPDATES & RENDERING
========================= */
function saveResult(result) {
    result.id = Date.now();
    state.history.push(result);
}

function showPopup(title, subtitle, rating) {
    document.getElementById('popup-title').innerText = title;
    document.getElementById('popup-subtitle').innerText = subtitle;
    document.getElementById('popup-rating').innerText = rating;
    
    const popup = document.getElementById('popup');
    popup.classList.remove('hidden');
    // small delay to allow display:block to apply before animating opacity
    setTimeout(() => popup.classList.remove('opacity-0'), 10);
}

function hidePopup() {
    const popup = document.getElementById('popup');
    popup.classList.add('opacity-0');
    setTimeout(() => popup.classList.add('hidden'), 300);
}

function getPersonalBest() {
    const filtered = state.history.filter(h => h.mode === state.mode);
    if (filtered.length === 0) return null;
    if (state.mode === "reaction") return Math.min(...filtered.map(h => h.score));
    return Math.max(...filtered.map(h => h.score));
}

function renderAll() {
    // Modes
    const modeContainer = document.getElementById('mode-selector');
    modeContainer.innerHTML = ["typing", "clicking", "reaction"].map(m => `
        <button class="btn ${state.mode === m ? 'btn-default' : 'btn-outline'}" onclick="setMode('${m}')">
            ${m.charAt(0).toUpperCase() + m.slice(1)}
        </button>
    `).join('');

    // Times
    const timeContainer = document.getElementById('time-selector');
    if (state.mode === "reaction") {
        timeContainer.innerHTML = '';
    } else {
        timeContainer.innerHTML = TIME_OPTIONS.map(t => `
            <button class="btn ${state.timeLimit === t ? 'btn-default' : 'btn-outline'}" onclick="setTimeLimit(${t})">
                ${t}s
            </button>
        `).join('');
    }

    // Personal Best
    const pb = getPersonalBest();
    const pbContainer = document.getElementById('personal-best');
    if (pb !== null) {
        const unit = state.mode === "reaction" ? "ms" : state.mode === "typing" ? "WPM" : "CPS";
        pbContainer.innerText = `Personal Best: ${pb} ${unit}`;
    } else {
        pbContainer.innerText = '';
    }

    renderMainContainer();
    updateChart();
}

function renderMainContainer() {
    const container = document.getElementById('active-mode-container');
    
    if (state.mode === "typing") {
        container.innerHTML = `
            <div class="space-y-4">
                <div class="text-center mb-4" id="timer-display">Time: ${state.timeLeft}s</div>
                
                <div class="relative border rounded-xl p-4 min-h-[120px] text-lg leading-relaxed break-words cursor-text ${state.darkMode?'border-gray-700':'border-gray-200'}" 
                     onclick="document.getElementById('typing-input').focus()">
                    <div id="words-display"></div>
                    <input id="typing-input" class="absolute inset-0 w-full h-full opacity-0 z-10" autocomplete="off" spellcheck="false" />
                </div>

                <div class="flex justify-center mt-4">
                    ${!state.isActive 
                        ? `<button class="btn btn-default" onclick="startTyping()">Start</button>` 
                        : `<button class="btn btn-outline" onclick="finishTyping()">Stop</button>`}
                </div>
            </div>
        `;
        
        // Setup the input listener safely AFTER rendering
        const inputEl = document.getElementById('typing-input');
        if (inputEl) {
            inputEl.value = state.input;
            inputEl.addEventListener('input', handleTypingInput);
            updateTypingWordsUI();
        }

    } else if (state.mode === "clicking") {
        container.innerHTML = `
            <div class="space-y-6 text-center">
                <div class="mb-4" id="timer-display">Time: ${state.timeLeft}s</div>
                
                <div id="click-target" 
                     class="w-40 h-40 mx-auto rounded-2xl text-white flex items-center justify-center text-xl font-semibold cursor-pointer select-none transition-transform active:scale-95 shadow-md ${state.darkMode ? 'bg-gray-700 hover:bg-gray-600' : 'bg-black hover:bg-gray-800'}"
                     style="touch-action: manipulation;"
                     onclick="handleClickArea()">
                    ${state.isActive ? `${state.clicks} clicks` : "Click"}
                </div>
                
                <div class="mt-4">
                    ${!state.isActive ? `<button class="btn btn-default" onclick="startClicking()">Start</button>` : ``}
                </div>
            </div>
        `;

    } else if (state.mode === "reaction") {
        container.innerHTML = `
            <div class="space-y-6 text-center">
                <div id="reaction-target" onclick="handleReactionClick()"></div>
                <div class="mt-4">
                    <button class="btn btn-default" onclick="startReaction()">Start</button>
                </div>
                ${state.reactionTime === "Too Early" ? `<div class="text-red-500 mt-2 font-bold">Too Early!</div>` : ''}
            </div>
        `;
        updateReactionUI();
    }
}

function updateChart() {
    const data = state.history.filter(h => h.mode === state.mode);
    const wrapper = document.getElementById('chart-wrapper');
    const ctx = document.getElementById('history-chart').getContext('2d');

    if (data.length === 0) {
        wrapper.classList.add('hidden');
        return;
    }
    
    wrapper.classList.remove('hidden');
    const textColor = state.darkMode ? '#e5e7eb' : '#374151';
    const gridColor = state.darkMode ? '#374151' : '#e5e7eb';

    if (chartInstance) {
        chartInstance.destroy(); // Rebuild to handle color changes cleanly
    }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map((_, i) => `Test ${i + 1}`),
            datasets: [{
                label: state.mode === "reaction" ? "Time (ms)" : state.mode === "typing" ? "WPM" : "CPS",
                data: data.map(d => d.score),
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 3,
                tension: 0.3,
                fill: true,
                pointBackgroundColor: '#3b82f6'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            color: textColor,
            scales: {
                x: { grid: { display: false }, ticks: { color: textColor } },
                y: { grid: { color: gridColor }, ticks: { color: textColor } }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}

/* =========================
   INITIALIZATION
========================= */
document.getElementById('btn-theme').addEventListener('click', toggleDarkMode);
document.getElementById('btn-close-popup').addEventListener('click', hidePopup);

// Start the app
renderAll();

</script>
